version: 2

builds:
  - main: .
    binary: agentbox
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bjro/agentbox/cmd.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "agentbox_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

brews:
  - repository:
      owner: bjro
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/BjRo/agentbox
    description: Generate devcontainer setups for AI coding agents
    license: MIT
    install: |
      bin.install "agentbox"
    test: |
      system "#{bin}/agentbox", "--version"
